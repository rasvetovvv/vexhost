server {
    listen 80;
    server_name host.vexory.xyz vexory.xyz www.vexory.xyz _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://api.telegram.org; frame-ancestors 'none'; base-uri 'none'; object-src 'none'" always;

    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"ok":true,"service":"vexhost-web"}';
    }

    location = /favicon.ico {
        try_files /favicon.png =404;
    }

    location = /manifest.json {
        default_type application/manifest+json;
        return 200 '{"name":"VexHost","short_name":"VexHost","start_url":"/","display":"standalone","background_color":"#000000","theme_color":"#000000","icons":[{"src":"/favicon.png","sizes":"192x192","type":"image/png"}]}';
    }

    location /api/ {
        proxy_pass http://vexhost-api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /p/ { return 404; }
    location ^~ /p/.workspaces/ { return 404; }
    location ^~ /p/ {
        try_files $uri $uri/ $uri/index.html =404;
        add_header X-VexHost-Static true;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name ~^(?<vhsub>[a-z0-9-]+)\.vexory\.xyz$;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://api.telegram.org; frame-ancestors 'none'; base-uri 'none'; object-src 'none'" always;

    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"ok":true,"service":"vexhost-web"}';
    }

    location = /favicon.ico {
        try_files /favicon.png =404;
    }

    location = /manifest.json {
        default_type application/manifest+json;
        return 200 '{"name":"VexHost","short_name":"VexHost","start_url":"/","display":"standalone","background_color":"#000000","theme_color":"#000000","icons":[{"src":"/favicon.png","sizes":"192x192","type":"image/png"}]}';
    }

    location /api/ {
        proxy_pass http://vexhost-api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /p/.workspaces/ { return 404; }

    location @runtime_proxy {
        proxy_pass http://vexhost-api:8000/api/runtime-proxy$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # For subdomain root, serve the static index directly. For assets, map
        # /style.css -> /p/<subdomain>/style.css. If no static file exists,
        # fall back to the runtime container proxy.
        try_files /p/$vhsub$uri /p/$vhsub$uri/index.html /p/$vhsub/index.html @runtime_proxy;
    }
}
